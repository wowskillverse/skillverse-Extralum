<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Fondo: gradiente suave -->
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <radialGradient id="glowA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Capa 0: Fondo -->
  <rect id="layer-bg" width="800" height="600" fill="url(#bgGrad)"/>

  <!-- Capa 1 (profundidad baja / se mueve poco) -->
  <g id="layer-far" data-parallax-mouse="0.015" data-parallax-scroll="20">
    <circle cx="680" cy="100" r="80" fill="url(#glowA)" opacity="0.5"/>
    <circle cx="100" cy="480" r="60" fill="url(#glowB)" opacity="0.4"/>
    <circle cx="400" cy="550" r="40" fill="#7c3aed" opacity="0.1"/>
  </g>

  <!-- Capa 2 (profundidad media) -->
  <g id="layer-mid" data-parallax-mouse="0.04" data-parallax-scroll="45">
    <ellipse cx="200" cy="180" rx="120" ry="80" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.4"/>
    <ellipse cx="600" cy="420" rx="90" ry="60" fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.4"/>
    <line x1="300" y1="100" x2="700" y2="500" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>
    <line x1="100" y1="300" x2="750" y2="250" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>
  </g>

  <!-- Capa 3 (primer plano / se mueve más) -->
  <g id="layer-near" data-parallax-mouse="0.08" data-parallax-scroll="80">
    <polygon points="400,80 460,200 340,200" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.7"/>
    <polygon points="400,80 460,200 340,200" fill="#7c3aed" opacity="0.1"/>
    <circle cx="400" cy="300" r="55" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.6"/>
    <circle cx="400" cy="300" r="30" fill="#2563eb" opacity="0.2"/>
    <!-- Texto de marca -->
    <text x="400" y="308" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700"
          fill="#ffffff" text-anchor="middle" letter-spacing="4" opacity="0.9">EXTRALUM</text>
  </g>

  <!-- Capa 4 (partículas flotantes / máximo movimiento) -->
  <g id="layer-particles" data-parallax-mouse="0.12" data-parallax-scroll="120">
    <circle cx="150" cy="150" r="3" fill="#a78bfa" opacity="0.8"/>
    <circle cx="650" cy="200" r="4" fill="#60a5fa" opacity="0.7"/>
    <circle cx="550" cy="100" r="2" fill="#ffffff" opacity="0.6"/>
    <circle cx="250" cy="450" r="3" fill="#a78bfa" opacity="0.6"/>
    <circle cx="700" cy="380" r="2.5" fill="#60a5fa" opacity="0.7"/>
    <circle cx="320" cy="520" r="2" fill="#ffffff" opacity="0.5"/>
    <circle cx="480" cy="480" r="3.5" fill="#a78bfa" opacity="0.6"/>
    <circle cx="80" cy="320" r="2" fill="#60a5fa" opacity="0.7"/>
  </g>
</svg>
